name: smart_text_assistant
description: A smart text assistant app with translation, search, explanation, and save features.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # HTTP Client
  dio: ^5.3.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # File & Path
  path_provider: ^2.1.0
  path: ^1.8.3
  
  # Share & Social
  share_plus: ^7.0.0
  receive_sharing_intent: ^1.4.5
  
  # UI
  flutter_markdown: ^0.6.14
  google_fonts: ^6.1.0
  
  # Utilities
  uuid: ^4.0.0
  intl: ^0.19.0
  url_launcher: ^6.1.0
  logger: ^2.1.0
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
